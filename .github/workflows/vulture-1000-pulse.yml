name: Vulture 1000 Content Engine

on:
  schedule:
    # Daily at 2:30 AM UTC
    - cron: '30 2 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  generate-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sync With Remote Repository
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install Generation Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install requests

          # Optional dependencies
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Vulture 1000 Script
        run: |
          if [ -f vulture_gen.py ]; then
            python vulture_gen.py
          fi
        env:
          KIT_AFFILIATE_ID: ${{ secrets.KIT_ID }}

      - name: Refresh Mega Blog
        run: |
          if [ -f generate_mega_blog.py ]; then
            python generate_mega_blog.py
          fi

      - name: Verify Sitemap Integrity
        run: |
          if [ -f sitemap.xml ]; then
            echo "Sitemap confirmed."
          else
            echo "sitemap.xml missing. Regenerating..."

            if [ -f sitemap_builder.py ]; then
              python sitemap_builder.py
            fi
          fi

      - name: Configure Git
        run: |
          git config --global user.name "Vulture-1000-Bot"
          git config --global user.email "bot@brightlane.ai"

      - name: Commit Changes
        run: |
          git add .

          git diff --cached --quiet && echo "No changes detected" && exit 0

          git commit -m "Vulture 1000 Pulse: $(date +'%Y-%m-%d') [Daily Content Refresh]"

      - name: Pull Latest Changes
        run: |
          git pull origin main --rebase

      - name: Push Updates
        run: |
          git push origin main

      - name: Ping Search Engines
        run: |
          if [ -f sitemap.xml ]; then

            curl "https://www.bing.com/indexnow?url=https://brightlane.github.io/A1-Website-Buider-Pro/sitemap.xml&key=${{ secrets.INDEXNOW_KEY }}"

          fi

name: Daily Social Media Blast
on:
  schedule:
    - cron: '0 13 * * *' # Fires at 9:00 AM EST daily
  workflow_dispatch: # Allows you to run it manually

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Social Poster
        run: python social_poster.py
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
